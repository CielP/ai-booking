server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API reverse proxy — strip /mountain-lodge prefix
    location /mountain-lodge/api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (disable buffering for streaming responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Static files for SPA
    location /mountain-lodge/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /mountain-lodge/index.html;
    }

    # Redirect /mountain-lodge to /mountain-lodge/
    location = /mountain-lodge {
        return 301 /mountain-lodge/;
    }
}
